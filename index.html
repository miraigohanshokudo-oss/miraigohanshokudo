<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みらいごはん食堂 | 防府市の子ども食堂・地域食堂</title>
    <meta name="description" content="山口県防府市のみらいごはん食堂。みんなで食べるごはんは美味しい。子ども無料、大人250円で開催中。">
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">

    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                        },
                        warm: '#fffaf0',
                    },
                    fontFamily: {
                        'maru': ['"Zen Maru Gothic"', 'sans-serif'],
                        'sans-logo': ['Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #fffaf0; /* Warm background */
            color: #4a4a4a;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 237, 213, 0.5);
        }

        /* Custom Scrollbar for nicer look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fffaf0; }
        ::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }

        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* Markdown style output */
        .prose h3 { font-weight: bold; font-size: 1.25rem; color: #ea580c; margin-top: 1.5em; margin-bottom: 0.5em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose p { margin-bottom: 1em; }

        /* Carousel Scroll - Hide Scrollbar but allow scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<meta name="google-site-verification" content="u4O0sNci7FlkvIMUHJtUUIxofOgIWXOOwc6gJb_Rj5k" />
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Google Sheet CSV URL
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuejf_70rGhnlDbFuv6c2z0qhKxWiH56PaC3F1HEwIO1ADEop_YwaezbCOmgfwFlM9_XhXM6WbIoct/pub?gid=1879743093&single=true&output=csv";

        // --- Icons (Lucide style) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></>,
                clock: <><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></>,
                "map-pin": <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
                award: <><circle cx="12" cy="8" r="7" /><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12" /></>,
                "shopping-bag": <><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></>,
                "hand-heart": <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                loader: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
                utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                "message-circle": <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />,
                instagram: <><rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" /></>,
                "chevron-right": <path d="m9 18 6-6-6-6" />,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z" />,
                camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />,
                crown: <path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.518l4.276 3.664a1 1 0 0 0 1.516-.294z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- Helper: Google Drive Link Converter ---
        const getGoogleDriveImageUrl = (url) => {
            if (!url) return '';
            const idMatch = url.match(/[-\w]{25,}/);
            if (idMatch) {
                return `https://lh3.googleusercontent.com/d/${idMatch[0]}`;
            }
            return url;
        };

        // --- Instagram Feed Component ---
        const InstagramSection = () => {
            useEffect(() => {
                // SPA(タブ切り替え)で再描画するために、既存のスクリプトを削除して再読み込みする
                const scriptId = 'curator-script';
                const existingScript = document.getElementById(scriptId);
                if (existingScript) {
                    existingScript.remove();
                }

                // Curatorの初期化フラグが残っている場合があるのでリセット
                if (window.Curator) {
                    window.Curator = undefined;
                }

                const script = document.createElement('script');
                script.id = scriptId;
                script.src = "https://cdn.curator.io/published/48187e1c-ab82-4549-87a1-e480e83d24ae.js";
                script.async = true;
                script.charset = "UTF-8";
                document.body.appendChild(script);

                return () => {
                    // タブが切り替わるときにスクリプトをクリーンアップ
                    const scriptToRemove = document.getElementById(scriptId);
                    if (scriptToRemove) {
                        scriptToRemove.remove();
                    }
                };
            }, []);

            return (
                <div className="space-y-6 py-8 animate-fade-in-up">
                    <div className="flex items-center gap-3 px-2 mb-4">
                        <div className="bg-gradient-to-br from-[#FFB224] via-[#FF0E64] to-[#A025C6] p-2 rounded-xl text-white">
                            <Icon name="instagram" size={24} />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800">活動の様子</h3>
                    </div>
                    
                    <div className="bg-white rounded-[2rem] shadow-lg shadow-gray-100/50 p-4 md:p-8 border border-orange-50">
                        <div id="curator-feed-default-feed-layout">
                            <a href="https://curator.io" target="_blank" rel="noopener noreferrer" className="crt-logo crt-tag">Powered by Curator.io</a>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Supporters Component ---
        // Accepts data via props instead of fetching internally
        const SupporterLink = ({ item, className }) => {
            if (item.link) {
                return <a href={item.link} target="_blank" rel="noopener noreferrer" className={`${className} hover:text-orange-500 underline decoration-orange-300 underline-offset-4 transition-colors`}>{item.name}</a>;
            }
            return <span className={className}>{item.name}</span>;
        };

        const SupportersSection = ({ data }) => {
            return (
                <div className="space-y-16 animate-fade-in-up pb-12">
                    <div className="text-center space-y-4">
                        <span className="inline-block py-1 px-3 rounded-full bg-orange-100 text-orange-600 text-xs font-bold tracking-wider">SUPPORTERS</span>
                        <h2 className="text-3xl md:text-4xl font-bold text-gray-800">支援者の皆様</h2>
                        <p className="text-gray-500 max-w-lg mx-auto leading-relaxed">
                            みらいごはん食堂は、地域の皆様の温かいご支援により運営されています。
                            心より感謝申し上げます。
                        </p>
                    </div>

                    {/* Special Supporters */}
                    <div className="relative">
                        <div className="absolute inset-0 bg-gradient-to-r from-yellow-200 via-orange-200 to-yellow-200 opacity-20 blur-3xl -z-10 rounded-full"></div>
                        <div className="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-yellow-100 text-center">
                            <div className="inline-flex items-center gap-2 bg-yellow-100 text-yellow-800 px-6 py-2 rounded-full font-bold mb-8">
                                <Icon name="award" size={20} className="text-yellow-600" /> ご協賛・ご支援（順不同）
                            </div>
                            
                            <div className="space-y-6">
                                {/* 特別協賛 (Platinum) */}
                                {data.special.platinum.length > 0 && (
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {data.special.platinum.map((item, i) => (
                                            <div key={i} className="group bg-gradient-to-br from-yellow-100 to-white border-4 border-yellow-400 px-8 py-5 rounded-2xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-3">
                                                <SupporterLink item={item} className="font-black text-2xl md:text-3xl text-gray-800 tracking-wider" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {/* ちょっといい協賛 (Gold) */}
                                {data.special.gold.length > 0 && (
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {data.special.gold.map((item, i) => (
                                            <div key={i} className="group bg-gradient-to-br from-yellow-50 to-white border-4 border-yellow-200 px-6 py-4 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-3">
                                                <SupporterLink item={item} className="font-bold text-xl text-gray-700" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {/* 通常協賛 (Silver) */}
                                {data.special.silver.length > 0 && (
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {data.special.silver.map((item, i) => (
                                            <div key={i} className="group bg-white border border-gray-100 px-5 py-3 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                                                <SupporterLink item={item} className="font-medium text-base text-gray-600" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {data.special.platinum.length === 0 && data.special.gold.length === 0 && data.special.silver.length === 0 && (
                                    <p className="text-gray-400">現在、表示するデータがありません。</p>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 md:gap-12">
                        {/* Food Donations */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-lg border-2 border-green-50 card-hover relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-5 text-green-500 transform rotate-12">
                                <Icon name="shopping-bag" size={120} />
                            </div>
                            <div className="flex items-center gap-3 mb-8">
                                <div className="bg-green-100 p-3 rounded-2xl text-green-600">
                                    <Icon name="leaf" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800">食材のご寄付（順不同）</h3>
                            </div>
                            <ul className="grid gap-3 relative z-10">
                                {data.food.length > 0 ? data.food.map((item, i) => (
                                    <li key={i} className="flex items-center gap-3 text-gray-600 border-b border-dashed border-gray-100 pb-2 last:border-0">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                                        <SupporterLink item={item} className="" />
                                    </li>
                                )) : <li className="text-gray-400 text-sm">現在情報の読み込み中または登録がありません</li>}
                            </ul>
                        </div>

                        {/* Money Donations */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-lg border-2 border-blue-50 card-hover relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-5 text-blue-500 transform -rotate-12">
                                <Icon name="hand-heart" size={120} />
                            </div>
                            <div className="flex items-center gap-3 mb-8">
                                <div className="bg-blue-100 p-3 rounded-2xl text-blue-600">
                                    <Icon name="heart" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800">活動資金・ご寄付（順不同）</h3>
                            </div>
                            <ul className="grid gap-4 relative z-10">
                                {/* 特別寄付 */}
                                {data.donations.platinum.map((item, i) => (
                                    <li key={`plat-${i}`} className="flex items-center gap-3 text-gray-800 border-b border-dashed border-gray-100 pb-3 last:border-0">
                                        <div className="w-2.5 h-2.5 rounded-full bg-blue-500"></div>
                                        <SupporterLink item={item} className="font-black text-xl tracking-wider" />
                                    </li>
                                ))}
                                {/* ちょっといい寄付 */}
                                {data.donations.gold.map((item, i) => (
                                    <li key={`gold-${i}`} className="flex items-center gap-3 text-gray-700 border-b border-dashed border-gray-100 pb-2 last:border-0">
                                        <div className="w-2 h-2 rounded-full bg-blue-400"></div>
                                        <SupporterLink item={item} className="font-bold text-lg" />
                                    </li>
                                ))}
                                {/* 通常寄付 */}
                                {data.donations.silver.map((item, i) => (
                                    <li key={`silv-${i}`} className="flex items-center gap-3 text-gray-600 border-b border-dashed border-gray-100 pb-2 last:border-0">
                                        <div className="w-1.5 h-1.5 rounded-full bg-blue-300"></div>
                                        <SupporterLink item={item} className="text-base" />
                                    </li>
                                ))}
                                {(data.donations.platinum.length === 0 && data.donations.gold.length === 0 && data.donations.silver.length === 0) && (
                                    <li className="text-gray-400 text-sm">現在情報の読み込み中または登録がありません</li>
                                )}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [supportersData, setSupportersData] = useState({ special: { platinum: [], gold: [], silver: [] }, food: [], donations: { platinum: [], gold: [], silver: [] } });
            const [activitiesData, setActivitiesData] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch data once at the top level
            useEffect(() => {
                fetch(GOOGLE_SHEET_CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                        const nextSupporters = { special: { platinum: [], gold: [], silver: [] }, food: [], donations: { platinum: [], gold: [], silver: [] } };
                        const nextActivities = [];
                        
                        // Start from index 1 to skip header
                        for(let i = 1; i < lines.length; i++) {
                            const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"(.*)"$/, '$1').trim());
                            
                            if (cols.length >= 2) {
                                const val1 = cols[0] ? cols[0].trim() : ""; // A列 (名前 or 活動のコメント)
                                const category = cols[1] ? cols[1].toLowerCase().trim() : ""; // B列
                                const val3 = cols[2] ? cols[2].trim() : ""; // C列
                                const val4 = cols[3] ? cols[3].trim() : ""; // D列 (リンク)
                                
                                if (category) {
                                    // Activity Images
                                    if (category.includes('activity') || category.includes('活動')) {
                                        if (val4) {
                                            nextActivities.push({
                                                url: getGoogleDriveImageUrl(val4),
                                                caption: val1 || val3 || "" // A列を優先、なければC列
                                            });
                                        }
                                    } 
                                    // Donations (Check first to avoid '特別寄付' matching '特別')
                                    else if (category.includes('特別寄付')) {
                                        if (val1) nextSupporters.donations.platinum.push({ name: val1, link: val4 });
                                    } else if (category.includes('ちょっといい寄付')) {
                                        if (val1) nextSupporters.donations.gold.push({ name: val1, link: val4 });
                                    } else if (category.includes('通常寄付')) {
                                        if (val1) nextSupporters.donations.silver.push({ name: val1, link: val4 });
                                    } else if (category.includes('food') || category.includes('食材')) {
                                        if (val1) nextSupporters.food.push({ name: val1, link: val4 });
                                    } 
                                    // Sponsors
                                    else if (category.includes('特別協賛') || category.includes('特別') || category.includes('special')) {
                                        if (val1) nextSupporters.special.platinum.push({ name: val1, link: val4 });
                                    } else if (category.includes('ちょっといい協賛')) {
                                        if (val1) nextSupporters.special.gold.push({ name: val1, link: val4 });
                                    } else if (category.includes('通常協賛') || category.includes('継続')) {
                                        if (val1) nextSupporters.special.silver.push({ name: val1, link: val4 });
                                    } else if (category.includes('donation') || category.includes('寄付')) {
                                        // Catch-all for any other generic donations
                                        if (val1) nextSupporters.donations.silver.push({ name: val1, link: val4 });
                                    }
                                }
                            }
                        }
                        setSupportersData(nextSupporters);
                        setActivitiesData(nextActivities);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Fetch error:", err);
                        setLoading(false);
                    });
            }, []);

            // Scroll to top when tab changes
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]);

            // Check if any supporters exist
            const hasSupporters = (supportersData.special.platinum.length > 0 || supportersData.special.gold.length > 0 || supportersData.special.silver.length > 0) || 
                                  supportersData.food.length > 0 || 
                                  (supportersData.donations.platinum.length > 0 || supportersData.donations.gold.length > 0 || supportersData.donations.silver.length > 0);

            const navItems = [
                { id: 'home', label: 'ホーム', icon: 'heart' },
                { id: 'about', label: '想い', icon: 'user' },
                // Only include 'supporters' tab if there is data
                hasSupporters ? { id: 'supporters', label: '支援者', icon: 'award' } : null,
                { id: 'goods', label: 'グッズ', icon: 'shopping-bag' },
                { id: 'contact', label: '参加', icon: 'message-circle' },
            ].filter(Boolean); // Remove nulls

            return (
                <div className="min-h-screen pb-20 selection:bg-orange-200 selection:text-orange-900">
                    {/* Navigation */}
                    <nav className="glass-nav fixed top-0 w-full z-50 px-4 py-4 transition-all duration-300">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div 
                                className="flex items-center gap-3 cursor-pointer group" 
                                onClick={() => setActiveTab('home')}
                            >
                                {/* Logo */}
                                <img 
                                    src="logo.png" 
                                    alt="みらいごはん食堂" 
                                    className="h-10 w-auto object-contain group-hover:scale-105 transition-transform"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'block';
                                    }}
                                />
                                <div className="hidden bg-gradient-to-br from-orange-400 to-orange-600 p-2 rounded-xl text-white shadow-lg shadow-orange-200 group-hover:scale-105 transition-transform" style={{display: 'none'}}>
                                    <Icon name="utensils" size={20} className="fill-white/20" />
                                </div>
                                <span className="font-bold text-lg md:text-xl tracking-tight text-gray-800 group-hover:text-orange-600 transition-colors">
                                    みらいごはん食堂
                                </span>
                            </div>
                            
                            {/* Desktop Nav */}
                            <div className="hidden md:flex bg-orange-50/50 p-1 rounded-full border border-orange-100/50">
