<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みらいごはん食堂 | 防府市の子ども食堂・地域食堂</title>
    <meta name="description" content="山口県防府市のみらいごはん食堂。みんなで食べるごはんは美味しい。子ども無料、大人250円で開催中。">
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">

    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                        },
                        warm: '#fffaf0',
                    },
                    fontFamily: {
                        'maru': ['"Zen Maru Gothic"', 'sans-serif'],
                        'sans-logo': ['Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #fffaf0; /* Warm background */
            color: #4a4a4a;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 237, 213, 0.5);
        }

        /* Custom Scrollbar for nicer look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fffaf0; }
        ::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }

        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* Markdown style output */
        .prose h3 { font-weight: bold; font-size: 1.25rem; color: #ea580c; margin-top: 1.5em; margin-bottom: 0.5em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose p { margin-bottom: 1em; }

        /* Carousel Scroll - Hide Scrollbar but allow scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<meta name="google-site-verification" content="u4O0sNci7FlkvIMUHJtUUIxofOgIWXOOwc6gJb_Rj5k" />
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Google Sheet CSV URL
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuejf_70rGhnlDbFuv6c2z0qhKxWiH56PaC3F1HEwIO1ADEop_YwaezbCOmgfwFlM9_XhXM6WbIoct/pub?gid=1879743093&single=true&output=csv";

        // --- Icons (Lucide style) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></>,
                clock: <><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></>,
                "map-pin": <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
                award: <><circle cx="12" cy="8" r="7" /><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12" /></>,
                "shopping-bag": <><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></>,
                "hand-heart": <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                loader: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
                utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                "message-circle": <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />,
                instagram: <><rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" /></>,
                "chevron-right": <path d="m9 18 6-6-6-6" />,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z" />,
                camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- Helper: Google Drive Link Converter ---
        const getGoogleDriveImageUrl = (url) => {
            if (!url) return '';
            const idMatch = url.match(/[-\w]{25,}/);
            if (idMatch) {
                return `https://lh3.googleusercontent.com/d/${idMatch[0]}`;
            }
            return url;
        };

        // --- Activity Carousel Component ---
        const ActivitySection = ({ activities }) => {
            const scrollRef = useRef(null);

            // Auto scroll effect
            useEffect(() => {
                if (!activities || activities.length === 0) return;
                const interval = setInterval(() => {
                    if (scrollRef.current) {
                        const { scrollLeft, scrollWidth, clientWidth } = scrollRef.current;
                        if (scrollLeft + clientWidth >= scrollWidth - 10) {
                            scrollRef.current.scrollTo({ left: 0, behavior: 'smooth' });
                        } else {
                            scrollRef.current.scrollBy({ left: 320, behavior: 'smooth' });
                        }
                    }
                }, 4000);
                return () => clearInterval(interval);
            }, [activities]);

            if (!activities || activities.length === 0) return null;

            return (
                <div className="space-y-6 py-8">
                    <div className="flex items-center gap-3 px-2">
                        <div className="bg-orange-100 p-2 rounded-xl text-orange-600">
                            <Icon name="camera" size={24} />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800">活動の様子</h3>
                    </div>
                    
                    <div 
                        ref={scrollRef}
                        className="flex gap-4 overflow-x-auto hide-scrollbar px-2 pb-4 snap-x snap-mandatory"
                        style={{ scrollBehavior: 'smooth' }}
                    >
                        {activities.map((act, i) => (
                            <div key={i} className="flex-shrink-0 w-80 h-60 rounded-2xl overflow-hidden shadow-md border border-orange-50 relative snap-center group bg-white">
                                <img 
                                    src={act.url} 
                                    alt={act.caption || "活動写真"} 
                                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                                    onError={(e) => e.target.style.display = 'none'}
                                />
                                {act.caption && (
                                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-4 pt-10">
                                        <p className="text-white text-sm font-bold text-center">{act.caption}</p>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Supporters Component ---
        // Accepts data via props instead of fetching internally
        const SupportersSection = ({ data }) => {
            return (
                <div className="space-y-16 animate-fade-in-up pb-12">
                    <div className="text-center space-y-4">
                        <span className="inline-block py-1 px-3 rounded-full bg-orange-100 text-orange-600 text-xs font-bold tracking-wider">SUPPORTERS</span>
                        <h2 className="text-3xl md:text-4xl font-bold text-gray-800">支援者の皆様</h2>
                        <p className="text-gray-500 max-w-lg mx-auto leading-relaxed">
                            みらいごはん食堂は、地域の皆様の温かいご支援により運営されています。
                            心より感謝申し上げます。
                        </p>
                    </div>

                    {/* Special Supporters */}
                    <div className="relative">
                        <div className="absolute inset-0 bg-gradient-to-r from-yellow-200 via-orange-200 to-yellow-200 opacity-20 blur-3xl -z-10 rounded-full"></div>
                        <div className="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-yellow-100 text-center">
                            <div className="inline-flex items-center gap-2 bg-yellow-100 text-yellow-800 px-6 py-2 rounded-full font-bold mb-8">
                                <Icon name="award" size={20} className="text-yellow-600" /> 特別協賛・継続支援
                            </div>
                            
                            {data.special.length > 0 ? (
                                <div className="flex flex-wrap justify-center gap-4">
                                    {data.special.map((name, i) => (
                                        <div key={i} className="group bg-gradient-to-br from-yellow-50 to-white border border-yellow-200 px-6 py-4 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center gap-3">
                                            <div className="bg-yellow-100 p-2 rounded-full group-hover:scale-110 transition-transform">
                                                <Icon name="heart" size={16} className="text-yellow-600 fill-yellow-600" />
                                            </div>
                                            <span className="font-bold text-lg text-gray-700">{name}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-gray-400">現在、表示するデータがありません。</p>
                            )}
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 md:gap-12">
                        {/* Food Donations */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-lg border-2 border-green-50 card-hover relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-5 text-green-500 transform rotate-12">
                                <Icon name="shopping-bag" size={120} />
                            </div>
                            <div className="flex items-center gap-3 mb-8">
                                <div className="bg-green-100 p-3 rounded-2xl text-green-600">
                                    <Icon name="leaf" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800">食材のご寄付</h3>
                            </div>
                            <ul className="grid gap-3 relative z-10">
                                {data.food.length > 0 ? data.food.map((name, i) => (
                                    <li key={i} className="flex items-center gap-3 text-gray-600 border-b border-dashed border-gray-100 pb-2 last:border-0">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                                        {name}
                                    </li>
                                )) : <li className="text-gray-400 text-sm">現在情報の読み込み中または登録がありません</li>}
                            </ul>
                        </div>

                        {/* Money Donations */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-lg border-2 border-blue-50 card-hover relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-5 text-blue-500 transform -rotate-12">
                                <Icon name="hand-heart" size={120} />
                            </div>
                            <div className="flex items-center gap-3 mb-8">
                                <div className="bg-blue-100 p-3 rounded-2xl text-blue-600">
                                    <Icon name="heart" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800">活動資金・ご寄付</h3>
                            </div>
                            <ul className="grid gap-3 relative z-10">
                                {data.donations.length > 0 ? data.donations.map((name, i) => (
                                    <li key={i} className="flex items-center gap-3 text-gray-600 border-b border-dashed border-gray-100 pb-2 last:border-0">
                                        <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                                        {name}
                                    </li>
                                )) : <li className="text-gray-400 text-sm">現在情報の読み込み中または登録がありません</li>}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [supportersData, setSupportersData] = useState({ special: [], food: [], donations: [] });
            const [activitiesData, setActivitiesData] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch data once at the top level
            useEffect(() => {
                fetch(GOOGLE_SHEET_CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                        const nextSupporters = { special: [], food: [], donations: [] };
                        const nextActivities = [];
                        
                        // Start from index 1 to skip header
                        for(let i = 1; i < lines.length; i++) {
                            const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"(.*)"$/, '$1').trim());
                            
                            if (cols.length >= 2) {
                                const val1 = cols[0]; // Name or URL (A列)
                                const category = cols[1].toLowerCase(); // Category (B列)
                                const val3 = cols[2]; // C列
                                const val4 = cols[3]; // D列
                                
                                if (val1) {
                                    // Activity Images
                                    if (category.includes('activity') || category.includes('活動')) {
                                        nextActivities.push({
                                            url: getGoogleDriveImageUrl(val1),
                                            caption: val4 || val3 || "" // D列を優先して表示、なければC列
                                        });
                                    } 
                                    // Supporters
                                    else if (category.includes('special') || category.includes('特別') || category.includes('継続')) {
                                        nextSupporters.special.push(val1);
                                    } else if (category.includes('food') || category.includes('食材')) {
                                        nextSupporters.food.push(val1);
                                    } else if (category.includes('donation') || category.includes('寄付')) {
                                        nextSupporters.donations.push(val1);
                                    }
                                }
                            }
                        }
                        setSupportersData(nextSupporters);
                        setActivitiesData(nextActivities);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Fetch error:", err);
                        setLoading(false);
                    });
            }, []);

            // Scroll to top when tab changes
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]);

            // Check if any supporters exist
            const hasSupporters = supportersData.special.length > 0 || 
                                  supportersData.food.length > 0 || 
                                  supportersData.donations.length > 0;

            const navItems = [
                { id: 'home', label: 'ホーム', icon: 'heart' },
                { id: 'about', label: '想い', icon: 'user' },
                // Only include 'supporters' tab if there is data
                hasSupporters ? { id: 'supporters', label: '支援者', icon: 'award' } : null,
                { id: 'contact', label: '参加', icon: 'message-circle' },
            ].filter(Boolean); // Remove nulls

            return (
                <div className="min-h-screen pb-20 selection:bg-orange-200 selection:text-orange-900">
                    {/* Navigation */}
                    <nav className="glass-nav fixed top-0 w-full z-50 px-4 py-4 transition-all duration-300">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div 
                                className="flex items-center gap-3 cursor-pointer group" 
                                onClick={() => setActiveTab('home')}
                            >
                                {/* Logo */}
                                <img 
                                    src="logo.png" 
                                    alt="みらいごはん食堂" 
                                    className="h-10 w-auto object-contain group-hover:scale-105 transition-transform"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'block';
                                    }}
                                />
                                <div className="hidden bg-gradient-to-br from-orange-400 to-orange-600 p-2 rounded-xl text-white shadow-lg shadow-orange-200 group-hover:scale-105 transition-transform" style={{display: 'none'}}>
                                    <Icon name="utensils" size={20} className="fill-white/20" />
                                </div>
                                <span className="font-bold text-lg md:text-xl tracking-tight text-gray-800 group-hover:text-orange-600 transition-colors">
                                    みらいごはん食堂
                                </span>
                            </div>
                            
                            {/* Desktop Nav */}
                            <div className="hidden md:flex bg-orange-50/50 p-1 rounded-full border border-orange-100/50">
                                {navItems.map((item) => (
                                    <button 
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)} 
                                        className={`px-6 py-2 rounded-full text-sm font-bold transition-all duration-300 flex items-center gap-2 ${
                                            activeTab === item.id 
                                            ? 'bg-white text-orange-600 shadow-sm ring-1 ring-orange-100' 
                                            : 'text-gray-500 hover:text-orange-500 hover:bg-white/50'
                                        }`}
                                    >
                                        {activeTab === item.id && <Icon name={item.icon} size={14} />}
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            {/* Mobile Nav Indicator (Simple) */}
                            <button className="md:hidden p-2 text-gray-600 bg-white rounded-full shadow-sm border border-gray-100" onClick={() => setActiveTab('contact')}>
                                <span className="text-xs font-bold px-2">予約</span>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Bottom Nav */}
                    <div className="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-white/90 backdrop-blur-md border border-orange-100 shadow-2xl rounded-full px-6 py-3 flex gap-6 items-center">
                         {navItems.map((item) => (
                            <button 
                                key={item.id}
                                onClick={() => setActiveTab(item.id)} 
                                className={`flex flex-col items-center gap-1 transition-colors ${activeTab === item.id ? 'text-orange-500' : 'text-gray-400'}`}
                            >
                                <Icon name={item.icon} size={20} className={activeTab === item.id ? 'fill-orange-100' : ''} />
                                <span className="text-[10px] font-bold">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    <main className="max-w-5xl mx-auto px-4 pt-28 md:pt-32">
                        {activeTab === 'home' && (
                            <div className="animate-fade-in-up space-y-16">
                                {/* Hero Section */}
                                <section className="relative rounded-[2.5rem] overflow-hidden shadow-2xl shadow-orange-200/50 bg-[#FF8C42] text-white p-10 md:p-24 text-center">
                                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
                                        <div className="absolute top-[-50px] left-[-50px] w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                                        <div className="absolute bottom-[-50px] right-[-50px] w-80 h-80 bg-orange-400/30 rounded-full blur-3xl"></div>
                                    </div>

                                    <div className="relative z-10 space-y-6">
                                        <div className="inline-block bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-sm font-bold tracking-wider mb-2 border border-white/20">
                                            山口県防府市の子ども食堂
                                        </div>
                                        <h2 className="text-4xl md:text-7xl font-black leading-tight tracking-tight drop-shadow-sm">
                                            みんなで食べる、<br/>
                                            <span className="inline-block animate-float">ごはん</span>はおいしい。
                                        </h2>
                                        <p className="text-lg md:text-xl font-medium opacity-90 max-w-xl mx-auto leading-relaxed">
                                            世代を超えて、誰もが気軽に集まれる地域の居場所。<br className="hidden md:block" />
                                            温かい手作りごはんを一緒に囲みませんか？
                                        </p>
                                    </div>
                                </section>

                                {/* Crowdfunding Banner - Updated for READYFOR */}
                                <a 
                                    href="https://readyfor.jp/projects/miraikodomosyokudo" 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="group block relative rounded-[2.5rem] overflow-hidden shadow-xl shadow-red-200/50 bg-gradient-to-br from-[#E60012] to-[#ff3a48] text-white p-8 md:p-10 card-hover transform transition-all duration-300 border border-red-400/50"
                                >
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
                                    <div className="absolute bottom-0 left-0 w-48 h-48 bg-yellow-400/20 rounded-full blur-2xl translate-y-1/3 -translate-x-1/4"></div>
                                    
                                    <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                                        <div className="flex flex-col md:flex-row items-center md:items-start gap-6 text-center md:text-left w-full md:w-auto">
                                            
                                            {/* CSS Logo Icon for READYFOR */}
                                            <div className="bg-white text-[#E60012] p-2 rounded-2xl shadow-lg flex-shrink-0 group-hover:scale-110 transition-transform duration-300 w-16 h-16 flex items-center justify-center border-b-4 border-gray-100">
                                                <span className="font-sans-logo font-black text-4xl leading-none pt-1">R</span>
                                            </div>
                                            
                                            <div>
                                                <span className="inline-flex items-center gap-1.5 py-1 px-3 rounded-full bg-white text-[#E60012] text-xs font-bold tracking-widest mb-3 shadow-sm font-sans-logo">
                                                    READYFOR <span className="text-gray-400 font-normal">|</span> プロジェクト挑戦中
                                                </span>
                                                <h3 className="text-2xl md:text-3xl font-black mb-3 tracking-tight drop-shadow-sm">
                                                    クラウドファンディング<br className="md:hidden" />始めました！
                                                </h3>
                                                <p className="text-red-50 text-sm md:text-base font-medium leading-relaxed">
                                                    みらいごはん食堂のスタートアップ資金として、<br className="hidden md:block" />
                                                    皆様の温かいご支援をお願いいたします。
                                                </p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex-shrink-0 bg-white text-[#E60012] font-bold py-4 px-8 rounded-full shadow-lg flex items-center gap-2 group-hover:bg-red-50 group-hover:pr-6 transition-all duration-300 w-full md:w-auto justify-center">
                                            支援ページへ <Icon name="chevron-right" size={20} className="group-hover:translate-x-1 transition-transform" />
                                        </div>
                                    </div>
                                </a>
                                
                                {/* Activity Slideshow */}
                                <ActivitySection activities={activitiesData} />

                                {/* Info Grid */}
                                <div className="grid md:grid-cols-2 gap-6 md:gap-8">
                                    <div className="bg-white rounded-[2rem] p-8 shadow-lg shadow-gray-100/50 border border-orange-50 flex flex-col justify-between card-hover">
                                        <div>
                                            <div className="flex items-center gap-3 mb-6">
                                                <div className="bg-orange-100 p-3 rounded-2xl text-orange-600">
                                                    <Icon name="calendar" size={24} />
                                                </div>
                                                <h3 className="text-2xl font-bold text-gray-800">次回開催について</h3>
                                            </div>
                                            <div className="space-y-6 pl-2">
                                                <div className="flex gap-4 items-start">
                                                    <div className="text-gray-300 mt-1"><Icon name="clock" size={20} /></div>
                                                    <div>
                                                        <p className="font-bold text-lg text-gray-700">毎月 第3日曜日</p>
                                                        <p className="text-gray-500 font-medium">11:30 〜 13:30頃</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 items-start">
                                                    <div className="text-gray-300 mt-1"><Icon name="map-pin" size={20} /></div>
                                                    <div>
                                                        <p className="font-bold text-lg text-gray-700">ケアハウスあいおい苑 1階</p>
                                                        <a href="https://www.google.com/maps/search/?api=1&query=ケアハウスあいおい苑+防府市佐野152-1" target="_blank" className="text-orange-500 text-sm font-bold underline hover:no-underline">防府市佐野152-1 (地図)</a>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-orange-50 to-white rounded-[2rem] p-8 shadow-lg shadow-gray-100/50 border border-orange-100 text-center flex flex-col justify-center items-center card-hover">
                                        <div className="bg-white p-4 rounded-full shadow-sm mb-4">
                                            <Icon name="utensils" size={32} className="text-orange-500" />
                                        </div>
                                        <p className="text-gray-400 font-bold text-sm tracking-widest mb-2">PARTICIPATION FEE</p>
                                        <div className="space-y-2 mb-8">
                                            <p className="text-4xl font-black text-gray-800">子ども <span className="text-orange-500 text-6xl">無料</span></p>
                                            <div className="w-12 h-1 bg-gray-100 mx-auto rounded-full"></div>
                                            <p className="text-xl font-bold text-gray-500">大人 250円</p>
                                        </div>
                                        <button 
                                            onClick={() => setActiveTab('contact')} 
                                            className="bg-gray-900 text-white font-bold py-4 px-10 rounded-full shadow-lg hover:bg-orange-500 transition-colors duration-300 flex items-center gap-2"
                                        >
                                            参加予約する <Icon name="chevron-right" size={18} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'about' && (
                            <div className="animate-fade-in-up space-y-12">
                                <div className="bg-white rounded-[2.5rem] p-10 md:p-16 shadow-xl shadow-orange-100/50 border border-orange-50 relative overflow-hidden">
                                    <div className="absolute -left-10 top-0 w-24 h-full bg-orange-100/50 skew-x-12"></div>
                                    <div className="relative z-10">
                                        <h3 className="text-3xl md:text-4xl font-bold mb-8 text-gray-800 flex items-center gap-3">
                                            <span className="text-4xl">🍊</span> 私たちの想い
                                        </h3>
                                        <p className="text-lg md:text-xl leading-loose text-gray-600 font-medium text-justify">
                                            「みらいごはん食堂」は、山口県防府市で活動する地域食堂です。<br/>
                                            お腹を満たすだけでなく、心も満たされる場所。<br/>
                                            世代を超えて誰もが気軽に集まり、温かいごはんを囲んで笑顔になれる「第3の居場所」を目指しています。
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] p-8 md:p-12 shadow-lg border border-gray-100 flex flex-col md:flex-row gap-8 items-center">
                                    <div className="relative">
                                        <div className="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-white shadow-lg overflow-hidden relative bg-orange-100 flex-shrink-0">
                                            <img 
                                                src="representative.jpg" 
                                                alt="代表 内田孔明" 
                                                className="w-full h-full object-cover"
                                                onError={(e) => {
                                                    e.target.style.display = 'none';
                                                    e.target.nextSibling.style.display = 'flex';
                                                }}
                                            />
                                            <div className="hidden absolute inset-0 flex items-center justify-center text-orange-500 bg-orange-100 w-full h-full" style={{display: 'none'}}>
                                                <Icon name="user" size={80} />
                                            </div>
                                        </div>
                                        <div className="absolute bottom-0 right-0 bg-orange-500 text-white p-2 rounded-full border-4 border-white">
                                            <Icon name="heart" size={16} className="fill-white" />
                                        </div>
                                    </div>
                                    <div className="text-center md:text-left flex-1">
                                        <div className="mb-4">
                                            <p className="text-xs font-bold text-orange-500 tracking-wider mb-1">REPRESENTATIVE</p>
                                            <h3 className="text-2xl font-bold text-gray-800">内田 孔明</h3>
                                        </div>
                                        <p className="text-gray-600 leading-relaxed bg-gray-50 p-6 rounded-2xl relative">
                                            <span className="absolute -top-3 left-8 text-4xl text-gray-200">"</span>
                                            地域の皆様の協力に支えられ、毎月温かい食事を提供できています。<br/>
                                            一人でも多くの子どもたち、そして地域の皆様の笑顔が見られるよう、これからも活動を続けてまいります。
                                            <span className="absolute -bottom-6 right-8 text-4xl text-gray-200">"</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'supporters' && <SupportersSection data={supportersData} />}

                        {activeTab === 'contact' && (
                            <div className="animate-fade-in-up max-w-3xl mx-auto text-center pb-12">
                                <div className="mb-12 space-y-4">
                                    <span className="inline-block py-1 px-3 rounded-full bg-blue-50 text-blue-600 text-xs font-bold tracking-wider">CONTACT</span>
                                    <h2 className="text-3xl md:text-4xl font-bold text-gray-800">参加・お問い合わせ</h2>
                                    <p className="text-gray-600">最新情報の確認やご予約は、以下の公式アカウントからお気軽にどうぞ。</p>
                                </div>
                                
                                <div className="grid gap-6">
                                    <a href="https://line.me/ti/g2/XtKt8VAP887JrKY9S0ERs1GesUh3lb5yctO5XA" target="_blank" className="group relative overflow-hidden bg-[#06C755] text-white p-1 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:shadow-green-200 transition-all duration-300">
                                        <div className="bg-white/10 absolute inset-0 group-hover:bg-white/0 transition-colors"></div>
                                        <div className="relative flex items-center justify-between p-8 md:px-10">
                                            <div className="flex items-center gap-6 text-left">
                                                <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm">
                                                    <Icon name="message-circle" size={40} className="fill-white" />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-bold opacity-90 mb-1">開催案内・参加予約はこちら</p>
                                                    <p className="text-2xl md:text-3xl font-black tracking-tight">LINEオープンチャット</p>
                                                </div>
                                            </div>
                                            <div className="bg-white text-[#06C755] p-3 rounded-full opacity-0 group-hover:opacity-100 transform translate-x-4 group-hover:translate-x-0 transition-all duration-300">
                                                <Icon name="chevron-right" size={24} />
                                            </div>
                                        </div>
                                    </a>

                                    <a href="https://www.instagram.com/miraigohanshokudo/" target="_blank" className="group relative overflow-hidden bg-gradient-to-tr from-[#FFB224] via-[#FF0E64] to-[#A025C6] text-white p-1 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:shadow-pink-200 transition-all duration-300">
                                        <div className="bg-black/10 absolute inset-0 group-hover:bg-black/0 transition-colors"></div>
                                        <div className="relative flex items-center justify-between p-8 md:px-10">
                                            <div className="flex items-center gap-6 text-left">
                                                <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm">
                                                    <Icon name="instagram" size={40} />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-bold opacity-90 mb-1">活動報告・DMでのお問い合わせ</p>
                                                    <p className="text-2xl md:text-3xl font-black tracking-tight">公式Instagram</p>
                                                </div>
                                            </div>
                                            <div className="bg-white text-[#FF0E64] p-3 rounded-full opacity-0 group-hover:opacity-100 transform translate-x-4 group-hover:translate-x-0 transition-all duration-300">
                                                <Icon name="chevron-right" size={24} />
                                            </div>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-12 text-center text-gray-400 text-sm border-t border-orange-100/50">
                        <div className="flex justify-center items-center gap-2 mb-4 opacity-50">
                             <Icon name="utensils" size={16} />
                        </div>
                        <p className="font-bold text-gray-500 text-base mb-2">みらいごはん食堂</p>
                        <p>山口県防府市佐野152-1 ケアハウスあいおい苑 1階</p>
                        <p className="mt-8 text-xs font-bold tracking-widest opacity-40">&copy; {new Date().getFullYear()} MIRAIGOHAN SHOKUDO</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
